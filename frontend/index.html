<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube RAG — Ask anything, get cited answers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
            slideUp: { '0%': { opacity: 0, transform: 'translateY(8px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            pulseSoft: { '0%, 100%': { opacity: 1 }, '50%': { opacity: 0.6 } },
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --bg-grad: radial-gradient(1200px 600px at 0% 0%, rgb(238 242 255 / 0.6), transparent),
                 radial-gradient(900px 500px at 100% 0%, rgb(250 245 255 / 0.6), transparent);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body::before {
      content: ''; position: fixed; inset: 0; background: var(--bg-grad);
      pointer-events: none; z-index: 0;
    }
    #root { position: relative; z-index: 1; }
    .line-clamp-2 {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .line-clamp-3 {
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    /* Smooth focus rings */
    *:focus-visible { outline: none; }
    button:focus-visible, input:focus-visible, select:focus-visible {
      box-shadow: 0 0 0 3px rgb(99 102 241 / 0.25);
    }
    /* Strategy color stripes (left border on compare columns) */
    .strat-sliding_window  { --strat: 99 102 241; }   /* indigo */
    .strat-recursive_token { --strat: 139 92 246; }   /* violet */
    .strat-sentence_window { --strat: 14 165 233; }   /* sky */
    .strat-semantic        { --strat: 16 185 129; }   /* emerald */
    .strat-fixed_time      { --strat: 245 158 11; }   /* amber */
    .strat-parent_child    { --strat: 236 72 153; }   /* pink */
    .strat-stripe {
      position: relative; overflow: hidden;
    }
    .strat-stripe::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: rgb(var(--strat, 99 102 241));
    }
    /* Subtle card shadow that lifts on hover */
    .card {
      background: rgb(255 255 255 / 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgb(228 228 231 / 0.7);
      box-shadow: 0 1px 2px rgb(0 0 0 / 0.04), 0 0 0 1px rgb(0 0 0 / 0.02);
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .card-hover:hover {
      box-shadow: 0 4px 12px rgb(0 0 0 / 0.06), 0 0 0 1px rgb(99 102 241 / 0.1);
      border-color: rgb(199 210 254);
    }
    /* Score bar */
    .score-bar {
      height: 4px; border-radius: 2px;
      background: linear-gradient(90deg, rgb(var(--strat, 99 102 241)) 0%, rgb(var(--strat, 99 102 241)) 100%);
      transition: width 0.4s ease-out;
    }

    /* Google-Doc-style prose for rendered markdown answers */
    .answer-prose {
      color: rgb(39 39 42);
      font-size: 14.5px;
      line-height: 1.7;
      letter-spacing: -0.005em;
    }
    .answer-prose > *:first-child { margin-top: 0; }
    .answer-prose > *:last-child { margin-bottom: 0; }
    .answer-prose h1, .answer-prose h2, .answer-prose h3, .answer-prose h4, .answer-prose h5, .answer-prose h6 {
      color: rgb(24 24 27);
      letter-spacing: -0.02em;
      font-weight: 700;
    }
    .answer-prose h1 { font-size: 1.7em; margin: 0.8em 0 0.4em; line-height: 1.25; }
    .answer-prose h2 {
      font-size: 1.35em; margin: 1.1em 0 0.5em; line-height: 1.3;
      padding-bottom: 0.3em; border-bottom: 1px solid rgb(228 228 231);
    }
    .answer-prose h3 { font-size: 1.15em; font-weight: 600; margin: 1em 0 0.4em; line-height: 1.4; }
    .answer-prose h4 { font-size: 1em; font-weight: 600; margin: 0.9em 0 0.3em; color: rgb(63 63 70); }
    .answer-prose p { margin: 0.7em 0; }
    .answer-prose ul, .answer-prose ol { margin: 0.7em 0; padding-left: 1.5em; }
    .answer-prose ul { list-style: disc; }
    .answer-prose ol { list-style: decimal; }
    .answer-prose li { margin: 0.3em 0; padding-left: 0.2em; }
    .answer-prose li::marker { color: rgb(99 102 241); }
    .answer-prose li > p { margin: 0.3em 0; }
    .answer-prose strong { font-weight: 600; color: rgb(24 24 27); }
    .answer-prose em { font-style: italic; }
    .answer-prose blockquote {
      margin: 1em 0; padding: 0.6em 1em;
      border-left: 3px solid rgb(99 102 241);
      background: linear-gradient(90deg, rgb(238 242 255 / 0.6), rgb(238 242 255 / 0));
      border-radius: 0 0.5rem 0.5rem 0;
      color: rgb(63 63 70);
    }
    .answer-prose blockquote p { margin: 0.25em 0; }
    .answer-prose code {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.88em; padding: 0.12em 0.4em;
      background: rgb(244 244 245); border-radius: 0.25rem;
      color: rgb(79 70 229); font-weight: 500;
    }
    .answer-prose pre {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.85em; padding: 0.9em 1.1em;
      background: rgb(24 24 27); color: rgb(228 228 231);
      border-radius: 0.5rem; overflow-x: auto; margin: 1em 0;
      line-height: 1.55;
    }
    .answer-prose pre code {
      background: transparent; color: inherit; padding: 0; font-size: inherit; font-weight: 400;
    }
    .answer-prose a {
      color: rgb(79 70 229); text-decoration: underline;
      text-decoration-color: rgb(199 210 254); text-underline-offset: 2px;
      transition: text-decoration-color 0.15s;
    }
    .answer-prose a:hover { text-decoration-color: rgb(79 70 229); }
    .answer-prose hr {
      border: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgb(228 228 231), transparent);
      margin: 1.5em 0;
    }
    .answer-prose table {
      width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.92em;
      border-radius: 0.5rem; overflow: hidden;
      box-shadow: 0 0 0 1px rgb(228 228 231);
    }
    .answer-prose th, .answer-prose td {
      padding: 0.55em 0.85em; border-bottom: 1px solid rgb(228 228 231); text-align: left;
    }
    .answer-prose th { background: rgb(244 244 245); font-weight: 600; color: rgb(24 24 27); }
    .answer-prose tr:last-child td { border-bottom: 0; }
    .answer-prose .citation-pill {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 22px; padding: 0 6px; margin: 0 2px;
      border-radius: 6px; border: 0;
      background: rgb(238 242 255); color: rgb(67 56 202);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px; font-weight: 600;
      cursor: pointer; vertical-align: 1px;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }
    .answer-prose .citation-pill:hover {
      background: rgb(79 70 229); color: white;
    }
    .answer-prose .citation-pill:active { transform: scale(0.95); }

    /* Visual cards */
    .visual-card {
      position: relative; overflow: hidden;
      background: rgb(255 255 255 / 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgb(228 228 231 / 0.7);
      border-radius: 0.75rem;
      box-shadow: 0 1px 2px rgb(0 0 0 / 0.04);
      transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }
    .visual-card::before {
      content: ''; position: absolute; left: 0; top: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, rgb(99 102 241), rgb(139 92 246), rgb(236 72 153));
      opacity: 0.85;
    }
    .visual-card:hover {
      box-shadow: 0 6px 18px rgb(0 0 0 / 0.06), 0 0 0 1px rgb(199 210 254);
      border-color: rgb(199 210 254);
    }
    .visual-title {
      font-weight: 600; color: rgb(24 24 27); font-size: 13.5px;
      letter-spacing: -0.01em; line-height: 1.35;
    }
    .visual-kicker {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgb(99 102 241);
    }
    .visual-step {
      position: relative; padding-left: 2.5rem;
    }
    .visual-step-num {
      position: absolute; left: 0; top: 0;
      width: 1.75rem; height: 1.75rem; border-radius: 0.5rem;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgb(99 102 241), rgb(139 92 246));
      color: white; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; font-weight: 700;
    }
    /* Mermaid SVG sizing */
    .mermaid-host { display: flex; justify-content: center; align-items: center; min-height: 80px; }
    .mermaid-host svg { max-width: 100%; height: auto; }
    .mermaid-fallback {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      background: rgb(244 244 245); padding: 0.85em; border-radius: 0.5rem;
      color: rgb(63 63 70); white-space: pre-wrap; overflow-x: auto;
    }
    /* Visual judge mini-bar */
    .visual-score-pill {
      display: inline-flex; align-items: center; gap: 0.25rem;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      padding: 0.15rem 0.5rem; border-radius: 999px;
      background: rgb(244 244 245); color: rgb(63 63 70);
    }
    /* Compact variant used inside narrow compare columns */
    .answer-prose-sm { font-size: 13px; line-height: 1.6; }
    .answer-prose-sm h1 { font-size: 1.35em; }
    .answer-prose-sm h2 { font-size: 1.2em; padding-bottom: 0.2em; }
    .answer-prose-sm h3 { font-size: 1.05em; }
    .answer-prose-sm h4 { font-size: 0.95em; }
    .answer-prose-sm pre { font-size: 0.78em; padding: 0.7em 0.85em; }
    .answer-prose-sm ul, .answer-prose-sm ol { padding-left: 1.3em; }
    .answer-prose-sm blockquote { padding: 0.4em 0.8em; }
    .answer-prose-sm .citation-pill { min-width: 20px; height: 20px; font-size: 10.5px; padding: 0 5px; }
  </style>
</head>
<body class="bg-zinc-50 text-zinc-900">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

function useYouTubeReady() {
  const [ready, setReady] = useState(false);
  useEffect(() => {
    if (window.YT && window.YT.Player) { setReady(true); return; }
    const t = setInterval(() => {
      if (window.YT && window.YT.Player) {
        setReady(true);
        clearInterval(t);
      }
    }, 100);
    return () => clearInterval(t);
  }, []);
  return ready;
}

function Spinner({ size = 16 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" className="animate-spin">
      <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" opacity="0.2" />
      <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
    </svg>
  );
}

function Logo() {
  return (
    <div className="flex items-center gap-2">
      <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 via-violet-500 to-pink-500 flex items-center justify-center shadow-sm">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M8 5v14l11-7z" fill="white"/>
        </svg>
      </div>
      <div className="flex flex-col leading-tight">
        <span className="font-semibold text-zinc-900 tracking-tight">YouTube RAG</span>
        <span className="text-[10px] uppercase tracking-wider text-zinc-400 font-medium">cited answers from video</span>
      </div>
    </div>
  );
}

function Header({ stats, docCount, onRefresh }) {
  return (
    <header className="mb-6 flex items-center justify-between animate-fade-in">
      <Logo />
      <button
        onClick={onRefresh}
        className="group flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/80 backdrop-blur border border-zinc-200/70 text-xs font-medium text-zinc-600 hover:text-zinc-900 hover:border-indigo-200 hover:bg-indigo-50/50 transition-all"
        title="Refresh stats"
      >
        <span className="font-mono text-indigo-600">{stats.videos}</span>
        <span className="text-zinc-500">video{stats.videos === 1 ? '' : 's'}</span>
        <span className="text-zinc-300">·</span>
        <span className="font-mono text-violet-600">{docCount}</span>
        <span className="text-zinc-500">paper{docCount === 1 ? '' : 's'}</span>
        <span className="text-zinc-300">·</span>
        <span className="font-mono text-pink-600">{stats.chunks}</span>
        <span className="text-zinc-500">chunks</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" className="text-zinc-400 group-hover:text-indigo-500 group-hover:rotate-180 transition-transform duration-500">
          <path d="M4 4v6h6M20 20v-6h-6M4 10a8 8 0 0 1 14-3M20 14a8 8 0 0 1-14 3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
    </header>
  );
}

function TabButton({ active, onClick, label, icon }) {
  return (
    <button
      onClick={onClick}
      className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-semibold uppercase tracking-wider transition-all ${
        active
          ? 'bg-white text-indigo-700 shadow-sm border border-indigo-100'
          : 'text-zinc-500 hover:text-zinc-800 border border-transparent'
      }`}
    >
      {icon}{label}
    </button>
  );
}

function IngestPanel({ onIngested }) {
  const [tab, setTab] = useState("youtube");
  const [url, setUrl] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const fileRef = useRef(null);
  const [pdfFile, setPdfFile] = useState(null);
  const [extractors, setExtractors] = useState([]);
  const [extractor, setExtractor] = useState("pypdfium2");
  const [dragOver, setDragOver] = useState(false);

  useEffect(() => {
    fetch("/extractors").then(r => r.json()).then(d => {
      setExtractors(d.extractors || []);
      const def = (d.extractors || []).find(e => e.default && e.available) || (d.extractors || []).find(e => e.available);
      if (def) setExtractor(def.name);
    }).catch(() => {});
  }, []);

  const submitUrl = async () => {
    const trimmed = url.trim();
    if (!trimmed) return;
    setBusy(true);
    setMsg("Ingesting in the background under all chunking strategies — check the server terminal for progress…");
    try {
      await fetch("/ingest", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: trimmed }),
      });
      setUrl("");
      setTimeout(onIngested, 3000);
      setTimeout(() => { onIngested(); setBusy(false); setMsg(""); }, 15000);
    } catch (e) {
      setMsg(`Error: ${e.message}`);
      setBusy(false);
    }
  };

  const submitPdf = async () => {
    if (!pdfFile) return;
    setBusy(true);
    setMsg(`Uploading and ingesting "${pdfFile.name}" with ${extractor}…`);
    const fd = new FormData();
    fd.append("file", pdfFile);
    fd.append("extractor", extractor);
    try {
      const r = await fetch("/ingest_pdf", { method: "POST", body: fd });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        setMsg(`Error: ${data.detail || r.statusText}`);
      } else {
        const total = data.total_chunks || 0;
        const strats = Object.entries(data.by_strategy || {}).map(([s, n]) => `${s}:${n}`).join(', ');
        setMsg(`Indexed "${data.title}" — ${total} chunks (${strats}). ${data.num_assets || 0} figures/tables extracted.`);
        setPdfFile(null);
        if (fileRef.current) fileRef.current.value = "";
        onIngested();
      }
    } catch (e) {
      setMsg(`Error: ${e.message}`);
    } finally {
      setBusy(false);
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f && f.name.toLowerCase().endsWith(".pdf")) setPdfFile(f);
  };

  return (
    <div className="card card-hover rounded-xl p-4 mb-6 animate-slide-up">
      <div className="flex items-center justify-between mb-3">
        <label className="flex items-center gap-2 text-xs font-semibold text-zinc-700 uppercase tracking-wider">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" className="text-indigo-500">
            <path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>
          </svg>
          Add to library
        </label>
        <div className="flex items-center bg-zinc-100/80 rounded-lg p-0.5">
          <TabButton
            active={tab === "youtube"}
            onClick={() => setTab("youtube")}
            label="YouTube"
            icon={<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10 8l6 4-6 4V8z"/></svg>}
          />
          <TabButton
            active={tab === "pdf"}
            onClick={() => setTab("pdf")}
            label="PDF"
            icon={<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" strokeWidth="2"/><path d="M14 2v6h6" stroke="currentColor" strokeWidth="2"/></svg>}
          />
        </div>
      </div>

      {tab === "youtube" && (
        <div className="flex gap-2 animate-fade-in">
          <input
            type="text"
            value={url}
            onChange={(e) => setUrl(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && submitUrl()}
            placeholder="https://youtube.com/playlist?list=…   or   https://youtu.be/…"
            className="flex-1 px-4 py-2.5 bg-white border border-zinc-200 rounded-lg text-sm placeholder:text-zinc-400 focus:border-indigo-400 focus:bg-white transition-colors"
          />
          <button
            onClick={submitUrl}
            disabled={busy || !url.trim()}
            className="px-5 py-2.5 bg-zinc-900 text-white rounded-lg text-sm font-medium hover:bg-zinc-800 disabled:opacity-50 disabled:cursor-not-allowed transition-all active:scale-[0.98] flex items-center gap-2"
          >
            {busy && <Spinner size={14} />}
            {busy ? "Ingesting" : "Ingest"}
          </button>
        </div>
      )}

      {tab === "pdf" && (
        <div className="space-y-3 animate-fade-in">
          <div
            onClick={() => fileRef.current && fileRef.current.click()}
            onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={onDrop}
            className={`cursor-pointer border-2 border-dashed rounded-lg px-4 py-6 text-center transition-all ${
              dragOver ? 'border-indigo-400 bg-indigo-50/40' : 'border-zinc-200 hover:border-indigo-300 hover:bg-indigo-50/20'
            }`}
          >
            <input
              type="file"
              ref={fileRef}
              accept="application/pdf,.pdf"
              onChange={(e) => setPdfFile(e.target.files && e.target.files[0])}
              className="hidden"
            />
            {pdfFile ? (
              <div className="text-sm text-zinc-800">
                <span className="font-medium">{pdfFile.name}</span>
                <span className="text-zinc-400 ml-2">({(pdfFile.size / 1024 / 1024).toFixed(1)} MB)</span>
              </div>
            ) : (
              <div>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" className="mx-auto text-indigo-400 mb-2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                <div className="text-sm text-zinc-700 font-medium">Drop a research paper or click to browse</div>
                <div className="text-xs text-zinc-400 mt-1">PDF up to 50 MB</div>
              </div>
            )}
          </div>
          <div className="flex flex-wrap items-center gap-3">
            <label className="text-xs font-semibold uppercase tracking-wider text-zinc-600">Extractor</label>
            <select
              value={extractor}
              onChange={(e) => setExtractor(e.target.value)}
              className="bg-white border border-zinc-200 rounded-lg px-2.5 py-1.5 text-xs font-medium text-zinc-700 hover:border-indigo-300 transition-colors cursor-pointer"
            >
              {extractors.map((e) => (
                <option key={e.name} value={e.name} disabled={!e.available}>
                  {e.label}{e.available ? "" : " — not installed"}
                </option>
              ))}
            </select>
            {extractors.find((e) => e.name === extractor) && (
              <div className="text-[11px] text-zinc-500 flex-1 min-w-[200px]">
                {extractors.find((e) => e.name === extractor).description}
              </div>
            )}
            <button
              onClick={submitPdf}
              disabled={busy || !pdfFile}

// Configure marked once — GFM + soft line breaks, no header IDs (avoid id collisions).
if (window.marked) {

}
// Mermaid: render on demand (not on document load) so React-mounted nodes get processed.
if (window.mermaid) {
  mermaid.initialize({
    startOnLoad: false,
    theme: 'neutral',
    securityLevel: 'strict',
    flowchart: { curve: 'basis', useMaxWidth: true },
    fontFamily: 'Inter, ui-sans-serif, sans-serif',
  });
}

// Render Claude's markdown answer to HTML while preserving [n] citations as
// interactive pills. We swap [n] markers for sentinel tokens before parsing
// (so markdown doesn't try to interpret them as reference links), then swap
// them back to <button> tags after parsing.
function renderAnswerHtml(rawText, validNs) {
  if (!rawText) return "";
  const text = rawText.replace(/\[(\d+)\]/g, (m, nStr) => {
    const n = parseInt(nStr, 10);
    return validNs.has(n) ? `␀CITE${n}␀` : m;
  });
  let html = window.marked ? marked.parse(text) : text;
  html = html.replace(/␀CITE(\d+)␀/g, (_, n) =>
    `<button class="citation-pill" data-cite="${n}" title="Jump to citation ${n}">${n}</button>`
  );
  if (window.DOMPurify) {
    html = DOMPurify.sanitize(html, {
      ADD_TAGS: ['button'],
      ADD_ATTR: ['class', 'data-cite', 'title'],
    });
  }
  return html;
}

function CitedAnswer({ answer, sources, onJump, compact = false }) {
  if (!answer) return null;
  const validNs = useMemo(() => new Set((sources || []).map((s) => s.n)), [sources]);
  const html = useMemo(() => renderAnswerHtml(answer, validNs), [answer, validNs]);

  // Event delegation: catch clicks on .citation-pill anywhere in the rendered tree.
  const onClick = useCallback(
    (e) => {
      const btn = e.target.closest && e.target.closest('button.citation-pill');
      if (!btn) return;
      const n = parseInt(btn.getAttribute('data-cite'), 10);
      const src = (sources || []).find((s) => s.n === n);
      if (!src) return;
      if (src.source_type === "pdf") {
        onJump({ kind: "pdf", doc_id: src.doc_id, page: src.page });
      } else {
        onJump({ kind: "youtube", video_id: src.video_id, start: src.start });
      }
    },
    [sources, onJump]
  );

  return (
    <div
      className={`answer-prose${compact ? ' answer-prose-sm' : ''}`}
      onClick={onClick}
      dangerouslySetInnerHTML={{ __html: html }}
    />
  );
}

function CitationChips({ citations, sources, onJump }) {
  const cs = (citations || []).filter((n) => sources.some((s) => s.n === n));
  if (!cs.length) return null;
  return (
    <div className="flex flex-wrap items-center gap-1 mt-2">
      <span className="text-[10px] uppercase tracking-wider text-zinc-400 font-semibold">Cites</span>
      {cs.map((n) => {
        const src = sources.find((s) => s.n === n);
        const onChipClick = () => src.source_type === "pdf"
          ? onJump({ kind: "pdf", doc_id: src.doc_id, page: src.page })
          : onJump({ kind: "youtube", video_id: src.video_id, start: src.start });
        return (
          <button
            key={n}
            onClick={onChipClick}
            className="inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 rounded-md bg-indigo-50 text-indigo-700 text-[10.5px] font-mono font-semibold hover:bg-indigo-600 hover:text-white transition-colors"
            title={src.source_type === "pdf" ? `Open ${src.title} at ${src.page_label}` : `Jump to ${src.timestamp} in "${src.title}"`}
          >
            {n}
          </button>
        );
      })}
    </div>
  );
}

function MermaidVisual({ visual, sources, onJump, idx }) {
  const hostRef = useRef(null);
  const [error, setError] = useState(false);
  useEffect(() => {
    setError(false);
    if (!hostRef.current || !window.mermaid) { setError(true); return; }
    const id = `mermaid-${idx}-${Date.now()}`;
    hostRef.current.innerHTML = "";
    mermaid.render(id, visual.code)
      .then(({ svg }) => { if (hostRef.current) hostRef.current.innerHTML = svg; })
      .catch(() => setError(true));
  }, [visual.code, idx]);

  return (
    <div className="visual-card p-4 animate-slide-up">
      <div className="visual-kicker mb-1">Diagram</div>
      <div className="visual-title mb-3">{visual.title}</div>
      {error ? (
        <div className="mermaid-fallback">{visual.code}</div>
      ) : (
        <div ref={hostRef} className="mermaid-host" />
      )}
      <CitationChips citations={visual.citations} sources={sources} onJump={onJump} />
    </div>
  );
}

  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  return (
    <div className={`w-16 h-1 rounded-full bg-zinc-100 overflow-hidden ${strategyClass}`}>
      <div className="score-bar" style={{ width: `${pct}%` }} />

  const axes = Object.keys(scores).filter((k) => k !== "total");

            <div className="flex items-center gap-2">

              <span className="font-mono text-zinc-800 w-3 text-right">{scores[axis]}</span>

          </div>
        ))}

function StrategyColumn({ result, judge, onJump }) {
  const isWinner = (() => {
    if (!judge) return false;
    if (judge.winner) return judge.winner === result.strategy;
    if (judge.answer && judge.answer.winner === result.strategy) return true;
    if (judge.retrieval && judge.retrieval.winner === result.strategy) return true;
    return false;
  })();

  let answerScores = null;
  let retrievalScores = null;
  if (judge) {
    if (judge.mode === "answer" && judge.scores) answerScores = judge.scores[result.strategy];
    else if (judge.mode === "retrieval" && judge.scores) retrievalScores = judge.scores[result.strategy];
    else if (judge.mode === "both") {
      answerScores = judge.answer?.scores?.[result.strategy];
      retrievalScores = judge.retrieval?.scores?.[result.strategy];
    }
  }

  const strategyClass = `strat-${result.strategy}`;
  const winnerRing = isWinner ? 'ring-2 ring-emerald-300/70 shadow-emerald-100' : '';

  return (
    <div className={`card strat-stripe ${strategyClass} ${winnerRing} rounded-xl p-4 flex flex-col animate-slide-up`} style={{ paddingLeft: '1.25rem' }}>
      <div className="flex items-center justify-between mb-2">
        <span className="font-mono text-[11px] font-semibold tracking-tight" style={{ color: `rgb(var(--strat))` }}>
          {result.strategy}
        </span>
        {isWinner && (
          <span className="flex items-center gap-1 text-[10px] font-semibold uppercase tracking-wider text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded-full">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4-6.2-4.5-6.2 4.5 2.4-7.4L2 9.4h7.6z"/>
            </svg>
            Winner
          </span>
        )}
      </div>
      <div className="flex items-center gap-3 text-[11px] text-zinc-400 mb-3 font-mono">
        <span>{result.latency_ms}ms</span>
        <span className="text-zinc-300">·</span>
        <span>{result.n_used}/{result.n_retrieved} chunks</span>
      </div>
      <div className="flex-1">
        <CitedAnswer answer={result.answer} sources={result.sources || []} onJump={onJump} compact />
      </div>
      {(result.sources || []).length > 0 && (
        <div className="mt-3 pt-3 border-t border-zinc-100 space-y-1">
          {(result.sources || []).map((src) => (
            <button
              key={src.n}
              onClick={() => src.source_type === "pdf"
                ? onJump({ kind: "pdf", doc_id: src.doc_id, page: src.page })
                : onJump({ kind: "youtube", video_id: src.video_id, start: src.start })}
              className="flex items-center gap-2 text-xs text-left w-full hover:bg-zinc-50 rounded-md px-1.5 py-1 transition-colors group"
            >
              <span className="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded bg-indigo-50 text-indigo-700 text-[10px] font-mono font-semibold flex-shrink-0">
                {src.n}
              </span>
              <span className="truncate text-zinc-600 group-hover:text-zinc-900 flex-1">{src.title}</span>
              <span className="text-indigo-600 font-mono text-[11px] font-medium flex-shrink-0">
                {src.source_type === "pdf" ? src.page_label : src.timestamp}
              </span>
            </button>
          ))}
        </div>
      )}
      {answerScores && <ScorePanel scores={answerScores} mode="Answer" strategyClass={strategyClass} />}
      {retrievalScores && <ScorePanel scores={retrievalScores} mode="Retrieval" strategyClass={strategyClass} />}
    </div>
  );
}

function JudgeVerdict({ judge }) {
  if (!judge) return null;
  if (judge.error) {
    return (
      <div className="rounded-xl border border-amber-200 bg-amber-50/80 backdrop-blur p-3 text-sm text-amber-900 flex items-start gap-2 animate-fade-in">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" className="text-amber-500 mt-0.5 flex-shrink-0">
          <path d="M12 9v4M12 17h.01M10.3 3.86l-8.4 14.6A2 2 0 0 0 3.6 21h16.8a2 2 0 0 0 1.7-2.5l-8.4-14.6a2 2 0 0 0-3.4 0z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
        </svg>
        <div><span className="font-semibold">Judge error:</span> {judge.error}</div>
      </div>
    );
  }
  return (
    <div className="rounded-xl border border-emerald-200/70 bg-gradient-to-br from-emerald-50/80 to-teal-50/80 backdrop-blur p-4 animate-fade-in">
      <div className="flex items-center gap-2 mb-1.5">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" className="text-emerald-600">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4-6.2-4.5-6.2 4.5 2.4-7.4L2 9.4h7.6z" fill="currentColor"/>
        </svg>
        <span className="text-[10px] font-bold uppercase tracking-widest text-emerald-700">Judge verdict · {judge.mode}</span>
      </div>
      {judge.mode === "both" ? (
        <div className="space-y-2 mt-2">
          {judge.answer && (
            <div className="text-sm">
              <span className="font-semibold text-zinc-900">Answer winner: </span>
              <span className="font-mono text-emerald-700">{judge.answer.winner}</span>
              <div className="text-xs text-zinc-600 mt-0.5">{judge.answer.reasoning}</div>
            </div>
          )}
          {judge.retrieval && (
            <div className="text-sm">
              <span className="font-semibold text-zinc-900">Retrieval winner: </span>
              <span className="font-mono text-emerald-700">{judge.retrieval.winner}</span>
              <div className="text-xs text-zinc-600 mt-0.5">{judge.retrieval.reasoning}</div>
            </div>
          )}
        </div>
      ) : (
        <div>
          <div className="text-sm">
            <span className="font-semibold text-zinc-900">Winner: </span>
            <span className="font-mono text-emerald-700">{judge.winner}</span>
          </div>
          <div className="text-xs text-zinc-700 mt-1 leading-relaxed">{judge.reasoning}</div>
        </div>
      )}
    </div>
  );
}

function CompareView({ compareData, onJump }) {
  if (!compareData) return null;
  const { results, judge } = compareData;
  return (
    <div className="space-y-3 animate-fade-in">
      <JudgeVerdict judge={judge} />
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
        {results.map((r) => (
          <StrategyColumn key={r.strategy} result={r} judge={judge} onJump={onJump} />
        ))}
      </div>
    </div>
  );
}

function SourceCard({ src, onJump }) {
  const isPdf = src.source_type === "pdf";
  const onClick = () => isPdf ? onJump({ kind: "pdf", doc_id: src.doc_id, page: src.page }) : onJump({ kind: "youtube", video_id: src.video_id, start: src.start });
  return (
    <button
      onClick={onClick}
      className="card card-hover flex gap-3 w-full rounded-xl p-3 text-left animate-slide-up"
    >
      <div className="relative flex-shrink-0">
        {isPdf ? (
          <div className="w-32 h-20 rounded-lg overflow-hidden bg-zinc-100 border border-zinc-200 flex items-center justify-center">
            <img
              src={src.thumbnail}
              alt=""
              className="w-full h-full object-cover object-top"
              onError={(e) => { e.currentTarget.style.display = 'none'; }}
              loading="lazy"
            />
          </div>
        ) : (
          <img src={src.thumbnail} alt="" className="w-32 h-20 object-cover rounded-lg bg-zinc-200" />
        )}
        <div className="absolute bottom-1 right-1 px-1.5 py-0.5 rounded bg-black/70 backdrop-blur text-white text-[10px] font-mono font-semibold">
          {isPdf ? src.page_label : src.timestamp}
        </div>
      </div>
      <div className="flex-1 min-w-0 py-0.5">
        <div className="flex items-start gap-2">
          <span className="inline-flex items-center justify-center min-w-[20px] h-5 px-1 rounded bg-indigo-50 text-indigo-700 text-[11px] font-mono font-semibold flex-shrink-0 mt-0.5">
            {src.n}
          </span>
          <div className="text-sm font-medium text-zinc-900 line-clamp-2 leading-snug">{src.title}</div>
        </div>
        {isPdf ? (
          <div className="text-xs text-zinc-500 mt-1 ml-7 line-clamp-1">
            {src.authors && <span>{src.authors}</span>}
            {src.section && (<><span className="mx-1.5 text-zinc-300">·</span>§ {src.section}</>)}
          </div>
        ) : src.channel && (
          <div className="text-xs text-zinc-500 mt-1 ml-7 line-clamp-2">{src.channel}</div>
        )}
        {src.snippet && (
          <div className="text-xs text-zinc-500 mt-1.5 ml-7 line-clamp-2 italic">"{src.snippet.slice(0, 120)}…"</div>
        )}
      </div>
    </button>
  );
}

function Preview({ mode, currentVideo, pdfDoc, pdfPage, compact, onChangePdfPage }) {
  // mode: "youtube" | "pdf" | "empty"
  return (
    <div className={`card rounded-xl overflow-hidden ${compact ? '' : 'sticky top-6'}`}>
      {/* YouTube player container is ALWAYS mounted so the YT.Player ref survives mode switches */}
      <div className={`aspect-video bg-zinc-900 relative ${mode === 'youtube' ? '' : 'hidden'}`}>
        <div id="yt-player" className="w-full h-full"></div>
      </div>

      {mode === 'pdf' && pdfDoc && (
        <div className="bg-zinc-50">
          <div className="flex items-center justify-between px-3 py-2 border-b border-zinc-200 bg-white/70 backdrop-blur">
            <div className="flex items-center gap-1.5">
              <button
                onClick={() => onChangePdfPage && onChangePdfPage(Math.max(1, pdfPage - 1))}
                disabled={pdfPage <= 1}
                className="p-1 rounded hover:bg-zinc-100 disabled:opacity-30 disabled:cursor-not-allowed"
                title="Previous page"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
              <span className="text-xs font-mono text-zinc-600">page {pdfPage}</span>
              <button
                onClick={() => onChangePdfPage && onChangePdfPage(pdfPage + 1)}
                className="p-1 rounded hover:bg-zinc-100"
                title="Next page"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
            </div>
            <a
              href={`/pdf_view?doc_id=${encodeURIComponent(pdfDoc)}#page=${pdfPage}`}
              target="_blank"
              rel="noopener"
              className="text-xs text-indigo-600 hover:text-indigo-800 font-medium"
              title="Open the full PDF in a new tab"
            >
              Open PDF ↗
            </a>
          </div>
          <div className="max-h-[60vh] overflow-auto p-2 flex items-start justify-center bg-zinc-100">
            <img
              key={`${pdfDoc}-${pdfPage}`}
              src={`/pdf_page?doc_id=${encodeURIComponent(pdfDoc)}&page=${pdfPage}`}
              alt={`Page ${pdfPage}`}
              className="max-w-full shadow-md rounded-sm bg-white"
              loading="eager"
            />
          </div>
        </div>
      )}

      {mode === 'empty' && (
        <div className="aspect-video bg-zinc-900 relative">
          <div className="absolute inset-0 flex flex-col items-center justify-center text-zinc-500 pointer-events-none p-4">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" className="text-zinc-700 mb-2">
              <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="1.5"/>
              <path d="M10 8l6 4-6 4V8z" fill="currentColor"/>
            </svg>
            <div className="text-xs text-center text-zinc-400 max-w-[200px]">
              Click a citation or source to view it here
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function DocumentsList({ documents, onOpen }) {
  const [open, setOpen] = useState(false);
  if (!documents.length) return null;
  return (
    <div className="card rounded-xl p-3 mb-6 animate-slide-up">
      <button
        onClick={() => setOpen(!open)}
        className="w-full flex justify-between items-center text-xs font-semibold text-zinc-700 uppercase tracking-wider hover:text-zinc-900 transition-colors"
      >
        <span className="flex items-center gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" className="text-violet-500">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" strokeWidth="2"/>
            <path d="M14 2v6h6M9 13h6M9 17h4" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
          </svg>
          Indexed papers
          <span className="font-mono text-violet-600 font-bold">{documents.length}</span>
        </span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" className={`text-zinc-400 transition-transform ${open ? 'rotate-180' : ''}`}>
          <path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
      {open && (
        <div className="mt-3 space-y-1.5 animate-fade-in">
          {documents.map((d) => (
            <button
              key={d.doc_id}
              onClick={() => onOpen && onOpen(d.doc_id, 1)}
              className="flex gap-3 items-center text-sm rounded-md p-2 hover:bg-zinc-50 transition-colors w-full text-left"
            >
              <div className="w-12 h-14 rounded bg-gradient-to-br from-violet-100 to-indigo-100 flex items-center justify-center flex-shrink-0 border border-violet-200/50">
                <span className="text-[9px] font-mono font-bold text-violet-700">{d.num_pages}p</span>
              </div>
              <div className="min-w-0 flex-1">
                <div className="truncate text-zinc-800 text-xs font-medium">{d.title}</div>
                {d.authors && <div className="truncate text-[11px] text-zinc-500">{d.authors}</div>}
                <div className="text-[10px] text-zinc-400 mt-0.5 font-mono">{d.extractor}{d.num_assets > 0 && ` · ${d.num_assets} assets`}</div>
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function VideosList({ videos }) {
  const [open, setOpen] = useState(false);
  if (!videos.length) return null;
  return (
    <div className="card rounded-xl p-3 mb-6 animate-slide-up">
      <button
        onClick={() => setOpen(!open)}
        className="w-full flex justify-between items-center text-xs font-semibold text-zinc-700 uppercase tracking-wider hover:text-zinc-900 transition-colors"
      >
        <span className="flex items-center gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" className="text-indigo-500">
            <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" strokeWidth="2"/>
            <path d="M10 9l5 3-5 3V9z" fill="currentColor"/>
          </svg>
          Indexed videos
          <span className="font-mono text-indigo-600 font-bold">{videos.length}</span>
        </span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" className={`text-zinc-400 transition-transform ${open ? 'rotate-180' : ''}`}>
          <path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
      {open && (
        <div className="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2 animate-fade-in">
          {videos.map((v) => (
            <div key={v.video_id} className="flex gap-2 items-center text-sm rounded-md p-1.5 hover:bg-zinc-50 transition-colors">
              <img src={v.thumbnail} alt="" className="w-12 h-8 object-cover rounded bg-zinc-200 flex-shrink-0"/>
              <div className="min-w-0 flex-1">
                <div className="truncate text-zinc-800 text-xs font-medium">{v.title}</div>
                {v.channel && <div className="truncate text-[11px] text-zinc-500">{v.channel}</div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function EmptyAnswerState({ hasVideos }) {
  return (
    <div className="card rounded-xl p-8 text-center animate-fade-in">
      <div className="inline-flex w-12 h-12 rounded-full bg-gradient-to-br from-indigo-100 to-violet-100 items-center justify-center mb-3">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" className="text-indigo-600">
          <circle cx="11" cy="11" r="8" stroke="currentColor" strokeWidth="2"/>
          <path d="M21 21l-4.3-4.3" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
        </svg>
      </div>
      <h3 className="text-sm font-semibold text-zinc-900 mb-1">
        {hasVideos ? "Ask anything about your indexed videos" : "Start by ingesting a playlist or video"}
      </h3>
      <p className="text-xs text-zinc-500 max-w-md mx-auto leading-relaxed">
        {hasVideos
          ? "Every answer includes inline citations that jump to the exact moment in the video. Toggle Compare mode to see how different chunking strategies perform side-by-side."
          : "Paste any YouTube playlist or single-video URL above. Transcripts are chunked across 6 strategies so you can benchmark retrieval quality on your own content."}
      </p>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(false);
  const [answer, setAnswer] = useState(null);
  const [sources, setSources] = useState([]);
  const [compareData, setCompareData] = useState(null);
  const [stats, setStats] = useState({ videos: 0, chunks: 0 });
  const [videos, setVideos] = useState([]);
  const [documents, setDocuments] = useState([]);
  const [currentVideo, setCurrentVideo] = useState(null);
  const [previewMode, setPreviewMode] = useState("empty");  // "empty" | "youtube" | "pdf"
  const [pdfDoc, setPdfDoc] = useState(null);
  const [pdfPage, setPdfPage] = useState(1);
  const [compareMode, setCompareMode] = useState(false);
  const [judgeMode, setJudgeMode] = useState("answer");
  const [visuals, setVisuals] = useState(null);
  const [visualsLoading, setVisualsLoading] = useState(false);
  const [judgeVisualsOn, setJudgeVisualsOn] = useState(false);
  const [lastQuestion, setLastQuestion] = useState("");

  const playerRef = useRef(null);
  const ytReady = useYouTubeReady();

  const refreshStats = useCallback(async () => {
    try {
      const [s, v, d] = await Promise.all([
        fetch("/stats").then((r) => r.json()),
        fetch("/videos").then((r) => r.json()),
        fetch("/documents").then((r) => r.json()).catch(() => ({ documents: [] })),
      ]);
      setStats(s);
      setVideos(v);
      setDocuments(d.documents || []);
    } catch (e) { /* ignore */ }
  }, []);

  useEffect(() => { refreshStats(); }, [refreshStats]);

  // Unified jump: handles both legacy (videoId, seconds) calls and the new
  // {kind:'youtube'|'pdf', ...} target shape used by source cards.
  const jumpTo = useCallback((targetOrVideoId, maybeSeconds) => {
    const target = (typeof targetOrVideoId === "object" && targetOrVideoId !== null)
      ? targetOrVideoId
      : { kind: "youtube", video_id: targetOrVideoId, start: maybeSeconds };

    if (target.kind === "pdf") {
      setPdfDoc(target.doc_id);
      setPdfPage(target.page || 1);
      setPreviewMode("pdf");
      return;
    }

    // youtube path
    const videoId = target.video_id;
    const start = Math.floor(target.start || 0);
    setPreviewMode("youtube");
    if (!ytReady) return;
    if (!playerRef.current) {
      playerRef.current = new window.YT.Player("yt-player", {
        videoId,
        playerVars: { start, autoplay: 1, rel: 0 },
      });
      setCurrentVideo(videoId);
      return;
    }
    if (currentVideo !== videoId) {
      playerRef.current.loadVideoById({ videoId, startSeconds: start });
      setCurrentVideo(videoId);
    } else {
      playerRef.current.seekTo(start, true);
      playerRef.current.playVideo();
    }
  }, [currentVideo, ytReady]);

  const ask = useCallback(async (question) => {
    setLoading(true);
    setAnswer(null);
    setSources([]);
    setCompareData(null);
    setVisuals(null);
    setLastQuestion(question);
    try {
      if (compareMode) {
        const r = await fetch("/ask_compare", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, judge_mode: judgeMode }),
        });
        if (!r.ok) setAnswer(`Error: ${await r.text()}`);
        else setCompareData(await r.json());
      } else {
        const r = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        if (!r.ok) setAnswer(`Error: ${await r.text()}`);
        else {
          const data = await r.json();
          setAnswer(data.answer);
          setSources(data.sources || []);
        }
      }
    } catch (e) {
      setAnswer(`Network error: ${e.message}`);
    } finally {
      setLoading(false);
    }
  }, [compareMode, judgeMode]);

  const visualize = useCallback(async () => {
    if (!lastQuestion) return;
    setVisualsLoading(true);
    setVisuals(null);
    try {
      const r = await fetch("/visualize", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: lastQuestion, judge: judgeVisualsOn }),
      });
      if (!r.ok) {
        setVisuals({ visuals: [], error: await r.text() });
      } else {
        setVisuals(await r.json());
      }
    } catch (e) {
      setVisuals({ visuals: [], error: e.message });
    } finally {
      setVisualsLoading(false);
    }
  }, [lastQuestion, judgeVisualsOn]);

  const showEmpty = !loading && !answer && !compareData;

  return (
    <div className="max-w-7xl mx-auto p-6">
      <Header stats={stats} docCount={documents.length} onRefresh={refreshStats} />
      <IngestPanel onIngested={refreshStats} />
      <VideosList videos={videos} />
      <DocumentsList documents={documents} onOpen={(doc_id, page) => jumpTo({ kind: "pdf", doc_id, page })} />

      <div className={`grid grid-cols-1 ${compareMode ? '' : 'lg:grid-cols-5'} gap-6`}>
        <div className={compareMode ? '' : 'lg:col-span-3 space-y-4'}>
          <AskPanel
            onAsk={ask}
            loading={loading}
            compareMode={compareMode}
            setCompareMode={setCompareMode}
            judgeMode={judgeMode}
            setJudgeMode={setJudgeMode}
          />
          <div className={compareMode ? 'mt-4' : ''}>
            {!compareMode && answer && <AnswerBlock answer={answer} sources={sources} onJump={jumpTo} />}
            {!compareMode && answer && sources.length > 0 && (
              <div className="mt-4">
                <VisualizeButton
                  onClick={visualize}
                  loading={visualsLoading}
                  judgeEnabled={judgeVisualsOn}
                  setJudgeEnabled={setJudgeVisualsOn}
                />
              </div>
            )}
            {!compareMode && visuals && (
              <div className="mt-4">
                <VisualsPanel data={visuals} onJump={jumpTo} />
              </div>
            )}
            {!compareMode && sources.length > 0 && (
              <div className="space-y-2 mt-4">
                <div className="flex items-center gap-2 text-xs font-semibold text-zinc-700 uppercase tracking-wider mb-1">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" className="text-amber-500">
                    <path d="M9 12l2 2 4-4M12 22s-8-4-8-12V5l8-3 8 3v5c0 8-8 12-8 12z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  Sources
                  <span className="font-mono text-zinc-400">{sources.length}</span>
                </div>
                {sources.map((src) => (
                  <SourceCard key={src.n} src={src} onJump={jumpTo} />
                ))}
              </div>
            )}
            {compareMode && compareData && <CompareView compareData={compareData} onJump={jumpTo} />}
            {compareMode && !compareData && answer && (
              <div className="card rounded-xl p-4 mt-4 text-sm text-red-600 flex items-start gap-2 animate-fade-in">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" className="text-red-500 mt-0.5 flex-shrink-0">
                  <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2"/>
                  <path d="M12 8v4M12 16h.01" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                </svg>
                {answer}
              </div>
            )}
            {showEmpty && <EmptyAnswerState hasVideos={stats.videos > 0 || documents.length > 0} />}
            {loading && (
              <div className="card rounded-xl p-6 mt-4 flex items-center justify-center gap-3 text-sm text-zinc-500 animate-fade-in">
                <Spinner size={18} />
                <span className="animate-pulse-soft">
                  {compareMode ? `Querying all 6 strategies and running the ${judgeMode} judge…` : "Searching and reasoning…"}
                </span>
              </div>
            )}
          </div>
        </div>
        {!compareMode && (
          <div className="lg:col-span-2">
            <Preview
              mode={previewMode}
              currentVideo={currentVideo}
              pdfDoc={pdfDoc}
              pdfPage={pdfPage}
              onChangePdfPage={(p) => setPdfPage(p)}
            />
          </div>
        )}
      </div>

      {compareMode && (
        <div className="fixed bottom-4 right-4 w-80 z-20 shadow-2xl rounded-xl overflow-hidden animate-fade-in">
          <Preview
            mode={previewMode}
            currentVideo={currentVideo}
            pdfDoc={pdfDoc}
            pdfPage={pdfPage}
            compact
            onChangePdfPage={(p) => setPdfPage(p)}
          />
        </div>
      )}

      <footer className="text-center text-xs text-zinc-400 mt-16 pb-4">
        Built with FastAPI · React · Chroma · 7 chunking strategies · LLM judge
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
